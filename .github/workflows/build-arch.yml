name: Build PKGBUILD (Arch Linux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Install base-devel & sudo
        run: |
          pacman -Sy --noconfirm base-devel git sudo

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix workspace ownership using $PWD
        run: |
          chown -R builder:builder "$PWD"

      - name: Build as builder
        run: |
          sudo -u builder bash -c "cd pkg && makepkg -si --noconfirm"

      - name: Upload built package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-build
          path: pkg/*.pkg.tar.*
